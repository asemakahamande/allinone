<!DOCTYPE html>
<html>
<head>
    <title>Exams</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
</head>
<body class="bg-gray-100 p-8">

    <div class="max-w-5xl mx-auto bg-white p-6 rounded-lg shadow">
        <h2 class="text-2xl font-bold mb-4">Exams</h2>

        <a href="{% url 'exams:create_exam' %}"
           class="inline-block mb-4 bg-blue-600 text-white px-4 py-2 rounded">
            + Create Exam
        </a>

        <table class="w-full border">
            <tr class="bg-gray-200">
                <th class="p-2">Subject</th>
                <th class="p-2">Term</th>
                <th class="p-2">Session</th>
                <th class="p-2">Code</th>
                <th class="p-2">Actions</th>
            </tr>
            {% for exam in exams %}
            <tr class="border-t">
                <td class="p-2">{{ exam.subject }}</td>
                <td class="p-2">{{ exam.term }}</td>
                <td class="p-2">{{ exam.session }}</td>
                <td class="p-2 font-mono">{{ exam.exam_code }}</td>
                <td class="p-2">
                    <a href="{% url 'exams:create_question' exam.id %}"
                       class="text-blue-600 underline">
                        Add Questions
                    </a>
                </td>
            </tr>
            {% endfor %}
        </table>
    </div>

</body>
</html>
