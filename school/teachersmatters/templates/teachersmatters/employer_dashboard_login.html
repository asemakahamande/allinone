<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employer Dashboard Access</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
    <!-- Optional: Include the forms plugin for better default styling -->
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-md">
        <h2 class="text-3xl font-bold text-center text-gray-800 mb-8">Employer Dashboard Access</h2>

        <form method="post" class="space-y-6">
            {% csrf_token %}
            <div>
                <label for="owner_password" class="block text-sm font-medium text-gray-700 mb-2">
                    Enter Owner Password:
                </label>
                <input 
                    type="password" 
                    id="owner_password" 
                    name="owner_password" 
                    placeholder="Password" 
                    required 
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
                >
            </div>

            <div class="text-center">
                <button 
                    type="submit" 
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-6 rounded-lg transition duration-200 shadow-md"
                >
                    Enter
                </button>
            </div>
        </form>

        {% for message in messages %}
            <p class="mt-6 text-center text-red-600 font-medium">{{ message }}</p>
        {% endfor %}
    </div>
</body>
</html>
