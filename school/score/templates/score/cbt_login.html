<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CBT Exam Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow">
                <div class="card-header bg-primary text-white text-center">
                    <h4>Student CBT Exam Login</h4>
                </div>
                <div class="card-body p-4">
                    {% if error %}
                        <div class="alert alert-danger">{{ error }}</div>
                    {% endif %}

                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label fw-bold">Exam Code</label>
                            <input type="text" name="exam_code" class="form-control" required maxlength="20" placeholder="e.g. ENG2025">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Exam Number</label>
                            <input type="text" name="exam_no" class="form-control" required placeholder="e.g. 00123">
                        </div>
                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label class="form-label fw-bold">Session</label>
                                <select name="session" class="form-select" required>
                                    <option value="">Select</option>
                                    {% for session in sessions %}
                                        <option value="{{ session.id }}">{{ session.name }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label fw-bold">Term</label>
                                <select name="term" class="form-select" required>
                                    <option value="">Select</option>
                                    {% for term in terms %}
                                        <option value="{{ term.id }}">{{ term.name }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label fw-bold">Class</label>
                                <select name="class_group" class="form-select" required>
                                    <option value="">Select</option>
                                    {% for class in classes %}
                                        <option value="{{ class.id }}">{{ class.name }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Start Exam</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
