{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Due Diligence - Login</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <script>
    // Toggle password visibility
    function togglePassword() {
      const passwordInput = document.getElementById("password");
      const eyeIcon = document.getElementById("eyeIcon");

      if (passwordInput.type === "password") {
        passwordInput.type = "text";
        eyeIcon.textContent = "🙈"; // change icon
      } else {
        passwordInput.type = "password";
        eyeIcon.textContent = "👁️"; // reset icon
      }
    }
  </script>
</head>
<body class="flex items-center justify-center min-h-screen bg-gradient-to-r from-purple-700 to-blue-500">
  <div class="bg-white shadow-lg rounded-xl p-8 w-full max-w-md">

    <h1 class="text-2xl font-bold text-center text-purple-700 mb-6">School Login</h1>

    <!-- Inline Form -->
    <form method="POST" class="space-y-4">
      {% csrf_token %}

      <label class="block text-gray-700 font-medium">Email:</label>
      <input 
        type="email" 
        name="email" 
        required 
        class="w-full border border-gray-300 rounded-md p-2 focus:ring-2 focus:ring-purple-500 focus:outline-none"
      >

      <label class="block text-gray-700 font-medium">Password:</label>
      <div class="flex items-center border border-gray-300 rounded-md">
        <input 
          type="password" 
          name="password" 
          id="password"
          required 
          class="w-full p-2 rounded-md focus:ring-2 focus:ring-purple-500 focus:outline-none"
        >
        <span 
          id="eyeIcon" 
          onclick="togglePassword()" 
          class="cursor-pointer px-3 text-gray-500 hover:text-purple-600"
        >
          👁️
        </span>
      </div>

      <button 
        type="submit" 
        class="w-full bg-purple-600 text-white py-2 rounded-lg hover:bg-purple-700 transition"
      >
        Login
      </button>
    </form>

    <!-- Messages -->
    {% for message in messages %}
      <p class="mt-3 text-center {% if message.tags == 'success' %}text-green-600{% else %}text-red-500{% endif %}">
        {{ message }}
      </p>
    {% endfor %}

    <!-- Register + Forgot Password -->
    <div class="mt-6 text-center">
      <a href="{% url 'forgot_password' %}" class="text-sm text-blue-600 hover:underline">Forgot Password?</a>
      <p class="mt-2 text-gray-600">
        Don’t have an account? 
        <a href="{%url 'register'%}" class="text-blue-600 hover:underline">Register</a>
      </p>
      <p class="mt-2 text-gray-600">
        <a href="{%url 'index'%}" class="text-blue-600 hover:underline">Back to Home </a>
      </p>
    </div>
  </div>
</body>
</html>
