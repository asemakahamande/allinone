{% extends "score/base_login.html" %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
    <div class="card shadow" style="width: 400px;">
        <div class="card-body">
            <h4 class="card-title text-center mb-4">Parent AI Portal Login</h4>
            
            {% if error %}
            <div class="alert alert-danger">{{ error }}</div>
            {% endif %}
            
            <form method="POST" action="{% url 'parent_portal_login' %}">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Student Admission Number (Exam No)</label>
                    <input type="text" name="admission_number" class="form-control" required placeholder="e.g. jc/jssone/0001">
                </div>
                <button type="submit" class="btn btn-primary w-100">Login to Parent Portal</button>
            </form>
            
            <div class="text-center mt-3">
                <a href="{% url 'unified_login' %}">Back to Main Login</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
